name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version_tag:
        description: "Release tag (e.g. v0.1.0). Publishes assets for this tag from the workflow branch commit."
        required: true
        type: string

permissions:
  contents: write
  packages: write

env:
  CARGO_TERM_COLOR: always
  VERSION_TAG: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.version_tag || github.ref_name }}

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          # x86 VPS / x86 gateways
          - target: x86_64-unknown-linux-gnu
            artifact: maverick-x86_64-unknown-linux-gnu
          # Raspberry Pi 4+, modern ARM gateways
          - target: aarch64-unknown-linux-gnu
            artifact: maverick-aarch64-unknown-linux-gnu
          # Raspberry Pi 3, older ARM gateways
          - target: armv7-unknown-linux-gnueabihf
            artifact: maverick-armv7-unknown-linux-gnueabihf

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && github.sha || github.ref }}

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install cross-compilation toolchain
        run: |
          sudo apt-get update -q
          case "${{ matrix.target }}" in
            aarch64-unknown-linux-gnu)
              # rusqlite/libsqlite3-sys builds C code: need target libc headers, not only the linker.
              sudo apt-get install -y --no-install-recommends \
                gcc-aarch64-linux-gnu \
                libc6-dev-arm64-cross
              {
                echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc"
                echo "CC_aarch64_unknown_linux_gnu=aarch64-linux-gnu-gcc"
                echo "AR_aarch64_unknown_linux_gnu=aarch64-linux-gnu-ar"
              } >> "$GITHUB_ENV"
              ;;
            armv7-unknown-linux-gnueabihf)
              sudo apt-get install -y --no-install-recommends \
                gcc-arm-linux-gnueabihf \
                libc6-dev-armhf-cross
              {
                echo "CARGO_TARGET_ARMV7_UNKNOWN_LINUX_GNUEABIHF_LINKER=arm-linux-gnueabihf-gcc"
                echo "CC_armv7_unknown_linux_gnueabihf=arm-linux-gnueabihf-gcc"
                echo "AR_armv7_unknown_linux_gnueabihf=arm-linux-gnueabihf-ar"
              } >> "$GITHUB_ENV"
              ;;
          esac

      - name: Build release binary
        run: |
          cargo build --release --target ${{ matrix.target }} -p maverick-runtime-edge
          cargo build --release --target ${{ matrix.target }} -p maverick-extension-tui

      - name: Package binary
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/maverick-edge dist/maverick-edge
          cp target/${{ matrix.target }}/release/maverick-edge-tui dist/maverick-edge-tui
          cp scripts/install-linux.sh dist/install-linux.sh
          chmod +x dist/maverick-edge dist/maverick-edge-tui dist/install-linux.sh
          cd dist
          tar -czf ../${{ matrix.artifact }}.tar.gz maverick-edge maverick-edge-tui install-linux.sh
          sha256sum ../${{ matrix.artifact }}.tar.gz > ../${{ matrix.artifact }}.tar.gz.sha256

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            ${{ matrix.artifact }}.tar.gz
            ${{ matrix.artifact }}.tar.gz.sha256

  publish-github-release:
    name: GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && github.sha || github.ref }}

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.VERSION_TAG }}
          target_commitish: ${{ github.sha }}
          generate_release_notes: true
          files: |
            artifacts/**/*.tar.gz
            artifacts/**/*.sha256

  publish-docker:
    name: Docker Image
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && github.sha || github.ref }}

      - name: Set up QEMU (multi-arch)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata (tags)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=${{ env.VERSION_TAG }}
            type=raw,value=latest,enable=${{ !contains(env.VERSION_TAG, '-') }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64,linux/arm/v7
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
