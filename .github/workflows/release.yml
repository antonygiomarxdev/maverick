name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version_tag:
        description: "Release tag (e.g. v0.1.0). Publishes assets for this tag from the workflow branch commit."
        required: true
        type: string

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  VERSION_TAG: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.version_tag || github.ref_name }}

jobs:
  prepare:
    name: Prepare release metadata
    runs-on: ubuntu-latest
    outputs:
      version_tag: ${{ steps.meta.outputs.version_tag }}
      workspace_version: ${{ steps.meta.outputs.workspace_version }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && github.sha || github.ref }}

      - name: Validate release tag against workspace version
        id: meta
        shell: bash
        run: |
          set -euo pipefail

          git fetch --force --tags origin

          workspace_version="$({
            awk '
              /^\[workspace\.package\]$/ { in_section=1; next }
              /^\[/ { in_section=0 }
              in_section && /^version = / {
                gsub(/\"/, "", $3)
                print $3
                exit
              }
            ' Cargo.toml
          })"

          if [[ -z "${workspace_version}" ]]; then
            echo "failed to resolve [workspace.package] version from Cargo.toml" >&2
            exit 1
          fi

          expected_tag="v${workspace_version}"
          if [[ "${VERSION_TAG}" != "${expected_tag}" ]]; then
            echo "release tag ${VERSION_TAG} does not match Cargo.toml workspace version ${workspace_version}" >&2
            exit 1
          fi

          tag_ref="refs/tags/${VERSION_TAG}"
          if git show-ref --verify --quiet "${tag_ref}"; then
            tag_commit="$(git rev-list -n 1 "${VERSION_TAG}")"
            current_commit="$(git rev-parse HEAD)"
            if [[ "${tag_commit}" != "${current_commit}" ]]; then
              echo "existing tag ${VERSION_TAG} points to ${tag_commit}, but this workflow is running on ${current_commit}" >&2
              echo "delete and recreate the tag on the intended commit, or bump the workspace version and publish a new tag" >&2
              exit 1
            fi
          fi

          {
            echo "version_tag=${VERSION_TAG}"
            echo "workspace_version=${workspace_version}"
          } >> "$GITHUB_OUTPUT"

  build:
    name: Build ${{ matrix.target }}
    needs: prepare
    runs-on: ubuntu-latest
    container:
      image: rust:1-bookworm
    strategy:
      matrix:
        include:
          # x86 VPS / x86 gateways
          - target: x86_64-unknown-linux-gnu
            artifact: maverick-x86_64-unknown-linux-gnu
          # Raspberry Pi 4+, modern ARM gateways
          - target: aarch64-unknown-linux-gnu
            artifact: maverick-aarch64-unknown-linux-gnu
          # Raspberry Pi 3, older ARM gateways
          - target: armv7-unknown-linux-gnueabihf
            artifact: maverick-armv7-unknown-linux-gnueabihf

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && github.sha || github.ref }}

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install cross-compilation toolchain
        run: |
          apt-get update -q
          case "${{ matrix.target }}" in
            aarch64-unknown-linux-gnu)
              # rusqlite/libsqlite3-sys builds C code: need target libc headers, not only the linker.
              # Without --sysroot, the cross gcc may pick host /usr/include and fail (wrong arch).
              apt-get install -y --no-install-recommends \
                gcc-aarch64-linux-gnu \
                libc6-dev-arm64-cross
              {
                echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc"
                echo "CC_aarch64_unknown_linux_gnu=aarch64-linux-gnu-gcc"
                echo "AR_aarch64_unknown_linux_gnu=aarch64-linux-gnu-ar"
                echo "CFLAGS_aarch64_unknown_linux_gnu=--sysroot=/usr/aarch64-linux-gnu"
              } >> "$GITHUB_ENV"
              ;;
            armv7-unknown-linux-gnueabihf)
              apt-get install -y --no-install-recommends \
                gcc-arm-linux-gnueabihf \
                libc6-dev-armhf-cross
              {
                echo "CARGO_TARGET_ARMV7_UNKNOWN_LINUX_GNUEABIHF_LINKER=arm-linux-gnueabihf-gcc"
                echo "CC_armv7_unknown_linux_gnueabihf=arm-linux-gnueabihf-gcc"
                echo "AR_armv7_unknown_linux_gnueabihf=arm-linux-gnueabihf-ar"
                echo "CFLAGS_armv7_unknown_linux_gnueabihf=--sysroot=/usr/arm-linux-gnueabihf"
              } >> "$GITHUB_ENV"
              ;;
          esac

      - name: Build release binary
        run: |
          cargo build --locked --release --target ${{ matrix.target }} -p maverick-runtime-edge
          cargo build --locked --release --target ${{ matrix.target }} -p maverick-extension-tui

      - name: Package binary
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/maverick-edge dist/maverick-edge
          cp target/${{ matrix.target }}/release/maverick-edge-tui dist/maverick-edge-tui
          cp scripts/install-linux.sh dist/install-linux.sh
          chmod +x dist/maverick-edge dist/maverick-edge-tui dist/install-linux.sh
          echo "${{ needs.prepare.outputs.version_tag }}" > dist/version.txt
          cd dist
          tar -czf ../${{ matrix.artifact }}.tar.gz maverick-edge maverick-edge-tui install-linux.sh version.txt
          cd ..
          sha256sum ${{ matrix.artifact }}.tar.gz > ${{ matrix.artifact }}.tar.gz.sha256

      - name: Generate SBOM
        uses: anchore/sbom-action@v0
        with:
          image: ${{ matrix.target }}
          format: spdx-json
          output-file: sbom-${{ matrix.target }}.spdx.json

      - name: Sign binaries with SIGSTORE
        uses: sigstore/sigstore-github-actions/sign-blobs@main
        with:
          blobs: |
            ${{ matrix.artifact }}.tar.gz
            ${{ matrix.artifact }}.tar.gz.sha256
          output-signatures: "${{ matrix.artifact }}.tar.gz.sig"
        env:
          SIGSTORE_REKOR_URL: https://rekor.sigstore.dev
          SIGSTORE_OIDC_ISSUER: https://oauth2.sigstore.dev
          SIGSTORE_OIDC_CLIENT_ID: sigstore

      - name: Upload signatures
        uses: actions/upload-artifact@v4
        with:
          name: signatures-${{ matrix.artifact }}
          path: "*.sig"

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom-${{ matrix.artifact }}
          path: sbom-${{ matrix.target }}.spdx.json

      - name: Verify packaged archive contents
        shell: bash
        run: |
          set -euo pipefail
          archive="${{ matrix.artifact }}.tar.gz"
          tar -tzf "${archive}" | sort > archive.txt
          diff -u <(printf '%s\n' install-linux.sh maverick-edge maverick-edge-tui version.txt | sort) archive.txt

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            ${{ matrix.artifact }}.tar.gz
            ${{ matrix.artifact }}.tar.gz.sha256

  publish-github-release:
    name: GitHub Release
    needs: [prepare, build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && github.sha || github.ref }}

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Download signature artifacts
        uses: actions/download-artifact@v4
        with:
          path: signature-artifacts/
          pattern: signatures-*
          merge-multiple: true

      - name: Download SBOM artifacts
        uses: actions/download-artifact@v4
        with:
          path: sbom-artifacts/
          pattern: sbom-*
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare.outputs.version_tag }}
          target_commitish: ${{ github.sha }}
          generate_release_notes: true
          files: |
            artifacts/**/*.tar.gz
            artifacts/**/*.sha256
            sbom-artifacts/*.spdx.json
            signature-artifacts/*.sig
