services:
  maverick-edge:
    build: .
    image: ${MAVERICK_IMAGE:-maverick-edge:local}
    container_name: ${MAVERICK_CONTAINER_NAME:-maverick-edge}
    restart: ${MAVERICK_RESTART_POLICY:-unless-stopped}
    volumes:
      - maverick-data:/var/lib/maverick
    environment:
      RUST_LOG: ${RUST_LOG:-info}

volumes:
  maverick-data:
